name: Mirror to KrisHillCo

on:
  push:
  workflow_dispatch:

jobs:
  mirror:
    # Run only in the ScaleSmall source repo, no matter which actor pushed.
    # The old actor-based guard both skipped legitimate mirrors and let this
    # workflow run inside KrisHillCo/HillCoSite, where it pushed the repo onto
    # itself (the failed "Mirror to KrisHillCo" runs). Loop protection comes from
    # convergence: an identical --mirror push is a no-op and fires no push event.
    if: github.repository == 'ScaleSmall/hillcosite'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Mirror this repo to KrisHillCo/HillCoSite
        env:
          SOURCE_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          TARGET_REPO: https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/KrisHillCo/HillCoSite.git
        run: |
          git clone --mirror "$SOURCE_REPO" repo.git
          cd repo.git
          # Mirror branches and tags only. `git push --mirror` also tries to push
          # GitHub's hidden refs/pull/* refs, which the target always rejects
          # ("deny updating a hidden ref") and fails the job once any PR exists.
          git push --prune "$TARGET_REPO" "+refs/heads/*:refs/heads/*" "+refs/tags/*:refs/tags/*"
