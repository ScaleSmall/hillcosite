name: Mirror to Primary Account

on:
  push:
  workflow_dispatch:

jobs:
  mirror:
    if: github.actor != 'YOUR_OTHER_ACCOUNT_USERNAME'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Mirror this repo back to primary account
        env:
          SOURCE_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          TARGET_REPO: https://x-access-token:${{ secrets.MIRROR_TO_PRIMARY_TOKEN }}@github.com/YOUR_OTHER_ACCOUNT_USERNAME/hillcosite.git
        run: |
          git clone --mirror "$SOURCE_REPO" repo.git
          cd repo.git
          git push --mirror "$TARGET_REPO"
