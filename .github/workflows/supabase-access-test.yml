name: Supabase Access Test

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/supabase-access-test.yml"

jobs:
  test-supabase-access:
    name: Test Supabase persistent access
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Verify required secrets are present
        shell: bash
        run: |
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF" || { echo "Missing SUPABASE_PROJECT_REF"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD" || { echo "Missing SUPABASE_DB_PASSWORD"; exit 1; }
          echo "Required secrets are present."

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Confirm Supabase CLI can authenticate
        shell: bash
        run: |
          supabase projects list

      - name: Link Supabase project
        shell: bash
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Validate linked project status
        shell: bash
        run: |
          supabase status --linked

      - name: Dry-run database connection with migration list
        shell: bash
        run: |
          supabase migration list --linked

      - name: Validate Edge Function source exists
        shell: bash
        run: |
          test -f supabase/functions/create-blog-post/index.ts || { echo "Missing create-blog-post function source"; exit 1; }
          echo "create-blog-post function source exists."
