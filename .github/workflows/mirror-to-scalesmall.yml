name: Mirror to ScaleSmall

on:
  push:
  workflow_dispatch:

jobs:
  mirror:
    # Run only in the KrisHillCo source repo, no matter which actor pushed.
    # The old `github.actor != 'ScaleSmall'` guard silently skipped mirroring for
    # every commit pushed or merged by the ScaleSmall account, stranding production
    # deploys (Cloudflare Pages builds from ScaleSmall/hillcosite).
    # Loop protection comes from convergence: the mirror push lands identical refs
    # on the target, so the target's mirror-back finds nothing to push and no
    # further push event fires.
    if: github.repository == 'KrisHillCo/HillCoSite'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Mirror this repo to ScaleSmall/hillcosite
        env:
          SOURCE_REPO: https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          TARGET_REPO: https://x-access-token:${{ secrets.MIRROR_TOKEN }}@github.com/ScaleSmall/hillcosite.git
        run: |
          git clone --mirror "$SOURCE_REPO" repo.git
          cd repo.git
          git push --mirror "$TARGET_REPO"
